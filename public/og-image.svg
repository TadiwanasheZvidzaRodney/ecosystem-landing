<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A1A1AA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  
  <!-- Logo centered -->
  <g transform="translate(500, 180)">
    <!-- Bottom layer -->
    <path d="M100 150 L30 110 L30 100 L100 140 L170 100 L170 110 Z" fill="#6B7280"/>
    <!-- Middle layer -->
    <path d="M100 120 L30 80 L30 70 L100 110 L170 70 L170 80 Z" fill="#9CA3AF"/>
    <!-- Top layer -->
    <path d="M100 90 L30 50 L30 35 L100 75 L170 35 L170 50 Z" fill="#D1D5DB"/>
    <!-- Highlight -->
    <path d="M100 90 L30 50 L30 35 L100 75 L170 35 L170 50 Z" fill="none" stroke="#FAFAFA" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="400" text-anchor="middle" fill="#FAFAFA" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700">
    Stratus
  </text>
  
  <text x="600" y="460" text-anchor="middle" fill="#A1A1AA" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400">
    The Infrastructure for African Innovation
  </text>
</svg>